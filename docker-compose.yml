services:
  ollama:
    # Pin to a tested version via OLLAMA_IMAGE_TAG in .env before production use
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    container_name: ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=0
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-6G}

  n8n:
    # Pin to a tested version via N8N_IMAGE_TAG in .env before production use
    image: n8nio/n8n:${N8N_IMAGE_TAG:-latest}
    container_name: n8n
    restart: unless-stopped
    # Bound to localhost by default: access via SSH tunnel or put a TLS
    # reverse proxy in front. n8n >= 1.0 has no Basic Auth; the first visitor
    # of an unprotected instance becomes the owner. See README "Security Notes".
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=${TZ:-Europe/Berlin}
      - TZ=${TZ:-Europe/Berlin}
      - N8N_SECURE_COOKIE=false
    depends_on:
      - ollama

volumes:
  ollama_data:
  n8n_data:
